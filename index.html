<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMR Recrutement</title>

<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">
<script src="https://assets.calendly.com/assets/external/widget.js"></script>

<style>
body {
  margin: 0;
  font-family: -apple-system, sans-serif;
  background: #f8f7f4;
  color: #1a1a1a;
}

/* NAV */
.nav {
  position: sticky;
  top: 0;
  background: #f8f7f4;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
}

.logo {
  font-weight: 600;
}

.nav-center {
  background: #2c2c2c;
  padding: 10px 20px;
  border-radius: 999px;
  display: flex;
  gap: 20px;
}

.nav-center a {
  color: white;
  text-decoration: none;
}

.cta {
  background: #c55200;
  color: white;
  padding: 12px 20px;
  border-radius: 999px;
  text-decoration: none;
}

/* LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 80px 20px;
}

/* FORM */
.form {
  margin-top: 50px;
  background: white;
  padding: 30px;
  border-radius: 12px;
  border: 1px solid #eee;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

.form input {
  padding: 14px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-size: 14px;
  width: 100%;
}

.form button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #1a1a1a;
  color: white;
  border: none;
  border-radius: 8px;
  font-weight: 600;
  cursor: pointer;
}
</style>
</head>

<body>

<nav class="nav">
  <div class="logo">GMR Recrutement</div>

  <div class="nav-center">
    <a href="#services">Services</a>
    <a href="#impact">Impact</a>
    <a href="#contact">Contact</a>
  </div>

  <a href="#contact" class="cta">Prendre rendez-vous</a>
</nav>

<section id="contact" class="container">
  <h2>Discutons de votre recrutement</h2>

  <!-- Calendly -->
  <div id="calendly"></div>

  <!-- FORMULAIRE -->
  <div class="form">
    <h3>Ou laissez-moi vos coordonnées</h3>

    <form>
      <div class="form-grid">
        <input type="text" placeholder="Prénom" required>
        <input type="text" placeholder="Nom" required>
        <input type="email" placeholder="Email" required>
        <input type="tel" placeholder="Téléphone">
        <input type="text" placeholder="Entreprise" style="grid-column: span 2;">
      </div>

      <button type="submit">Être recontacté</button>
    </form>
  </div>
</section>

<script>
Calendly.initInlineWidget({
  url: 'https://calendly.com/axelgrmr/30min',
  parentElement: document.getElementById('calendly')
});
</script>

</body>
</html>
